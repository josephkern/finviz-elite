name: Feature request
description: Propose a new endpoint, enum, or capability for finviz-elite.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. The more concrete you can be about the
        Finviz Elite endpoint, parameters, and expected output, the faster this
        can ship. If you're proposing a new endpoint, please include a sample
        URL (with the auth token redacted).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what you want.
      placeholder: "Wrap the Finviz Elite options chain export as a typed `options()` function."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who would use it and why?
      placeholder: "Currently the library wraps six Finviz Elite exports but omits options data. Users analyzing strategies (covered calls, cash-secured puts, IV screening) have to drop down to raw HTTP."
    validations:
      required: true

  - type: textarea
    id: endpoint
    attributes:
      label: Finviz endpoint(s)
      description: |
        URL pattern(s) on `elite.finviz.com`. Redact `auth=` tokens. Note any
        observed parameters and what they do. Mark anything you've verified
        empirically.
      placeholder: |
        Example: `https://elite.finviz.com/export/options?t=MSFT&ty=oc&e=2026-06-19`

        Verified params:
        - `t` ticker (required)
        - `ty=oc` options chain
        - `e=YYYY-MM-DD` expiration filter (must be a listed expiration)
      render: markdown
    validations:
      required: false

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed Python API
      description: Sketch the function signature and key enums. Match the style of existing endpoints in `_core.py`.
      placeholder: |
        ```python
        def options(
            ticker: str,
            expiration: Optional[str] = None,
            strike: Optional[float] = None,
            type: OptionsType = OptionsType.OPTIONS_CHAIN,
        ) -> str:
            ...
        ```
      render: markdown
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this — and why the proposal is better.
      placeholder: |
        - Raw `requests.get(...)` — works but no enum safety, no throttling.
        - `raw_filters` escape hatch on existing endpoints — doesn't apply since options has its own URL path.
    validations:
      required: false

  - type: textarea
    id: open-questions
    attributes:
      label: Open questions / unknowns
      description: Things that still need probing or design decisions.
      placeholder: |
        - Does `ty=ocv` return different columns?
        - Are `ov=` view modes UI-only or do they affect CSV output?
        - Sane default if `expiration` is omitted (returns very large chains for liquid names)?
    validations:
      required: false

  - type: checkboxes
    id: ack
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this proposal.
          required: true
        - label: This is in scope for a Finviz Elite client library (i.e. wraps an existing Finviz Elite endpoint, not a third-party data source).
          required: true
